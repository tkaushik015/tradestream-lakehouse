version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: tradestream-postgres
    environment:
      POSTGRES_DB: tradestream
      POSTGRES_USER: tradestream_user
      POSTGRES_PASSWORD: tradestream_pass
    ports:
      - "5432:5432"
    volumes:
      - ../postgres/init:/docker-entrypoint-initdb.d

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: tradestream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tradestream-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1